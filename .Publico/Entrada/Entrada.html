<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada</title>
    <link rel="icon" href="../Imgs/Logo.ico" type="image/png">
    <style>
        /* Estilos baseados na paleta de cores da imagem */
        body {
            background-image: url(../Imgs/Fundo.jpg);
            background-size: cover;
            background-position: center;
            color: #eaeaea; /* Cor clara para contraste */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 2rem;
            padding: 2rem;
            background-color: #2a2b4f;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .section {
            background-color: #393a63;
            padding: 1.5rem;
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
        }

        h1 {
            color: #f5a623;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid #444574;
            border-radius: 4px;
            background-color: #2a2b4f;
            color: #eaeaea;
        }

        input[type="submit"] {
            width: 100%;
            padding: 0.5rem;
            background-color: #8739af;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #a15bd5;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="section login">
            <h1>Login</h1>
            <form action="Porteiro.php" method="post">
                <input type="hidden" name="action" value="login">
                <label for="login-nome">Email</label>
                <input type="text" name="Email" id="login-nome" required>
                
                <label for="login-senha">Senha</label>
                <input type="password" name="Senha" id="login-senha" required>
                
                <input type="submit" value="Entrar">
            </form>
        </div>
        
        <div class="section cadastro">
            <h1>Cadastro</h1>
            <form action="Porteiro.php" method="post">
                <input type="hidden" name="action" value="cadastro">
                
                <label for="cadastro-nome">Nome</label>
                <input type="text" name="Nome" id="cadastro-nome" autocomplete="off" required>
                
                <label for="cadastro-email">Email</label>
                <input type="email" name="Email" id="cadastro-email" autocomplete="off" required>
                
                <label for="cadastro-niki">Nickname</label>
                <input type="text" name="Niki" id="cadastro-niki" autocomplete="off" required>
                
                <label for="cadastro-senha">Senha</label>
                <input type="password" name="Senha" id="cadastro-senha" autocomplete="off" required>
                
                <input type="submit" value="Cadastrar">
            </form>
        </div>
    </div>
</body>
</html>
